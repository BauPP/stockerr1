services:
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: stockerr-auth-service
    environment:
      PORT: 3002
      JWT_SECRET: stockerr-dev-secret
      JWT_EXPIRES_IN: 30m
      MAX_LOGIN_ATTEMPTS: 3
      LOCK_TIME_MINUTES: 15
      DEMO_USER_EMAIL: admin@stockerr.com
      DEMO_USER_PASSWORD: Admin1234
      DEMO_USER_NAME: Administrador Demo
      DEMO_USER_ROLE: Administrador
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: stockerr
      DB_NAME: stockerr
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: stockerr-product-service
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: stockerr
      DB_NAME: stockerr
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    
  category-service:
    build:
      context: .
      dockerfile: services/category-service/Dockerfile
    container_name: stockerr-category-service
    environment:
      PORT: 3003
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: stockerr
      DB_NAME: stockerr
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: stockerr-user-service
    environment:
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: stockerr
      DB_NAME: stockerr
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: stockerr-inventory-service
    environment:
      PORT: 3005
      AUTH_SERVICE_URL: http://auth-service:3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: stockerr
      DB_NAME: stockerr
      MS06_MOVEMENT_WEBHOOK_URL: ""
      MS09_MOVEMENT_WEBHOOK_URL: ""
    ports:
      - "3005:3005"
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: stockerr-api-gateway
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3002
      PRODUCT_SERVICE_URL: http://product-service:3001
      CATEGORY_SERVICE_URL: http://category-service:3003
      USER_SERVICE_URL: http://user-service:3004
      INVENTORY_SERVICE_URL: http://inventory-service:3005
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_started
      product-service:
        condition: service_started
      category-service:
        condition: service_started
      user-service:
        condition: service_started
      inventory-service:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: stockerr-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: stockerr
      POSTGRES_DB: stockerr
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stockerr"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - stockerr_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  stockerr_pg_data:
