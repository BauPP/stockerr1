services:
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: stockerr-auth-service
    environment:
      PORT: 3002
      JWT_SECRET: stockerr-dev-secret
      JWT_EXPIRES_IN: 30m
      MAX_LOGIN_ATTEMPTS: 3
      LOCK_TIME_MINUTES: 15
      DEMO_USER_USERNAME: admin
      DEMO_USER_PASSWORD: Admin1234
      DEMO_USER_NAME: Administrador Demo
      DEMO_USER_ROLE: Administrador
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: stockerr
      DB_PASSWORD: stockerr
      DB_NAME: stockerr
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: stockerr-api-gateway
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3002
    ports:
      - "3000:3000"
    depends_on:
      auth-service:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: stockerr-postgres
    environment:
      POSTGRES_USER: stockerr
      POSTGRES_PASSWORD: stockerr
      POSTGRES_DB: stockerr
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockerr -d stockerr"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - stockerr_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  stockerr_pg_data:
